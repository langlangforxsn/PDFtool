<!DOCTYPE html>
<html lang="zh-CN" x-data="splitApp()" :class="{ 'dark': localStorage.getItem('dark') === 'true' }">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拆分 PDF - 叮当猫的口袋</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' } } } }
    }
  </script>
<script src="https://gateway-w7tf.onrender.com/js/guard.js" defer></script>
</head>
<body class="min-h-screen bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">

  <nav class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50 backdrop-blur-sm bg-white/90 dark:bg-gray-800/90">
    <div class="max-w-4xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 font-bold text-lg text-brand-600 dark:text-brand-400">
        <span>📄</span><span>PDF 工具</span>
      </a>
      <button @click="localStorage.setItem('dark', localStorage.getItem('dark') === 'true' ? 'false' : 'true'); location.reload()"
        class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-6 py-10">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-violet-50 dark:bg-violet-900/30 text-4xl mb-4 shadow-sm">✂️</div>
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-gray-100">拆分 PDF</h1>
      <p class="text-gray-500 dark:text-gray-400 mt-2">按页码范围拆分 PDF，或将每一页拆为独立文件</p>
    </div>

    <!-- 上传区域 -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm p-6 mb-6">
      <label class="upload-zone rounded-xl p-8 text-center cursor-pointer block"
           :class="{ 'drag-over': dragOver }"
           @dragover.prevent="dragOver = true"
           @dragleave.prevent="dragOver = false"
           @drop.prevent="handleDrop($event)">
        <input type="file" accept=".pdf" class="hidden" @change="handleFileSelect($event)" />
        <div class="text-4xl mb-3">📁</div>
        <p class="text-gray-600 dark:text-gray-300 font-medium">点击或拖拽上传 PDF 文件</p>
      </label>

      <div x-show="hasFiles" class="mt-4">
        <div class="file-item flex items-center justify-between px-4 py-3 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
          <div class="flex items-center gap-3">
            <span class="text-lg">📄</span>
            <div>
              <p class="text-sm font-medium text-gray-700 dark:text-gray-200" x-text="files[0]?.name"></p>
              <p class="text-xs text-gray-400" x-text="formatSize(files[0]?.size || 0)"></p>
            </div>
          </div>
          <button @click="clearFiles()" class="p-1 text-gray-400 hover:text-red-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 拆分选项 -->
    <div x-show="hasFiles" class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm p-6 mb-6">
      <h3 class="font-semibold text-gray-800 dark:text-gray-100 mb-4">拆分方式</h3>

      <div class="space-y-3 mb-4">
        <label class="flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors"
               :class="mode === 'range' ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20' : 'border-gray-200 dark:border-gray-700'">
          <input type="radio" name="mode" value="range" x-model="mode" class="text-brand-600" />
          <div>
            <p class="text-sm font-medium text-gray-700 dark:text-gray-200">按页码范围</p>
            <p class="text-xs text-gray-400">指定要提取的页码范围</p>
          </div>
        </label>
        <label class="flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-colors"
               :class="mode === 'every_page' ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20' : 'border-gray-200 dark:border-gray-700'">
          <input type="radio" name="mode" value="every_page" x-model="mode" class="text-brand-600" />
          <div>
            <p class="text-sm font-medium text-gray-700 dark:text-gray-200">每页拆为独立文件</p>
            <p class="text-xs text-gray-400">将每一页保存为单独的 PDF</p>
          </div>
        </label>
      </div>

      <div x-show="mode === 'range'" class="mt-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">页码范围</label>
        <input type="text" x-model="pageRanges" placeholder="例如: 1-3,5,7-10"
          class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none" />
        <p class="text-xs text-gray-400 mt-1">多个范围用逗号分隔，如: 1-3,5,7-10</p>
      </div>
    </div>

    <div x-show="error" x-cloak class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl p-4 mb-6">
      <p class="text-sm text-red-700 dark:text-red-300" x-text="error"></p>
    </div>
    <div x-show="success" x-cloak class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl p-4 mb-6">
      <p class="text-sm text-green-700 dark:text-green-300">✅ 拆分完成！文件已自动下载</p>
    </div>

    <div x-show="processing" x-cloak class="mb-6">
      <div class="flex items-center justify-between text-sm text-gray-500 mb-2">
        <span>正在拆分...</span>
        <span x-text="progress + '%'"></span>
      </div>
      <div class="w-full h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
        <div class="progress-bar h-full bg-gradient-to-r from-violet-500 to-purple-500 rounded-full" :style="{ width: progress + '%' }"></div>
      </div>
    </div>

    <button @click="doSplit()" :disabled="!hasFiles || processing"
      class="w-full btn-primary text-white font-semibold py-3.5 rounded-xl text-base">
      <span x-show="!processing">✂️ 拆分 PDF</span>
      <span x-show="processing" class="flex items-center justify-center gap-2">
        <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        处理中...
      </span>
    </button>
  </main>

  <script src="js/app.js"></script>
  <script>
    function splitApp() {
      return uploadData({ multiFile: false, accept: '.pdf' }, {
        mode: 'range',
        pageRanges: '',
        doSplit() {
          const formData = new FormData();
          formData.append("file", this.files[0]);
          formData.append("mode", this.mode);
          formData.append("page_ranges", this.pageRanges);
          // 多文件时返回 ZIP，单文件时返回 PDF
          const isZip = (this.mode === 'every_page');
          const name = isZip ? 'split_files.zip' : 'split_output.pdf';
          this.processRequest("/api/split", formData, name);
        }
      });
    }
  </script>
</body>
</html>
